spring.application.name=hbcstore-api

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hbc_store?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:hbc-store-local-development-secret-change-before-production}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}
app.auth.google.client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}
app.auth.verify.base-url=${APP_AUTH_VERIFY_BASE_URL:http://localhost:5173/verify-email}
app.auth.verify.ttl-minutes=${APP_AUTH_VERIFY_TTL_MINUTES:30}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

payment.payos.enabled=${PAYMENT_PAYOS_ENABLED:true}
payment.payos.mock-mode=${PAYMENT_PAYOS_MOCK_MODE:false}
payment.payos.api-base-url=${PAYMENT_PAYOS_API_BASE_URL:https://api-merchant.payos.vn}
payment.payos.api-key=${PAYMENT_PAYOS_API_KEY:}
payment.payos.client-id=${PAYMENT_PAYOS_CLIENT_ID:}
payment.payos.merchant-id=${PAYMENT_PAYOS_MERCHANT_ID:}
payment.payos.checksum-key=${PAYMENT_PAYOS_CHECKSUM_KEY:}
payment.payos.currency=${PAYMENT_PAYOS_CURRENCY:VND}
payment.payos.return-url=${PAYMENT_PAYOS_RETURN_URL:http://localhost:5173/orders}
payment.payos.webhook-url=${PAYMENT_PAYOS_WEBHOOK_URL:http://localhost:8080/api/payments/payos/webhook}

gemini.enabled=${GEMINI_ENABLED:true}
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
gemini.timeout-ms=${GEMINI_TIMEOUT_MS:10000}
